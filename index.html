<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>529 Expense Tracker</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>529 Expense Tracker</h1>

<form id="expenseForm">

    <input
        type="date"
        id="date"
        required>

    <select id="category">

        <option>Books</option>
        <option>Tuition</option>
        <option>Housing</option>
        <option>Supplies</option>
        <option>Other</option>

    </select>

    <input
        type="text"
        id="description"
        placeholder="Description"
        required>

    <input
        type="number"
        id="amount"
        placeholder="Amount"
        step="0.01"
        required>

    <label for="receipt">Receipt</label>

    <input type="file" id="receipt" accept="image/*">

    <button id="submitButton">Add Expense</button>

</form>

<h2>Total:
<span id="total">$0.00</span>
</h2>

<div class="filters">

    <input
        type="text"
        id="search"
        placeholder="Search description...">

    <select id="filterCategory">

        <option value="All">All Categories</option>

        <option>Books</option>
        <option>Tuition</option>
        <option>Housing</option>
        <option>Supplies</option>
        <option>Other</option>

    </select>

    <select id="sortOption">

        <option value="dateNewest">Newest First</option>

        <option value="dateOldest">Oldest First</option>

        <option value="amountHigh">Highest Amount</option>

        <option value="amountLow">Lowest Amount</option>

    </select>

</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Receipt</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="expenseTable">

</tbody>

</table>

<script src="script.js"></script>

</body>

</html>
